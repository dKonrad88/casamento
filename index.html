<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Casamento</title>
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Casamento">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e1620;--card:#16222e;--card2:#1c2b3a;--ink:#e9eef3;--muted:#9fb1c2;--line:#243443;--primary:#185FA5;--primary2:#1a7a8a;--primary-d:#0d3d6b;--ok:#1f9d63;--erro:#d2533f;--radius:14px}
  [data-theme="light"]{--bg:#eef1f4;--card:#ffffff;--card2:#f4f7fa;--ink:#16202b;--muted:#5b6b7d;--line:#e0e6ec}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .header{background:linear-gradient(135deg,#0d3d6b,#185FA5 55%,#1a7a8a);color:#fff;padding:calc(env(safe-area-inset-top) + 20px) 18px 22px;border-radius:0 0 24px 24px;position:relative}
  .header h1{font-size:1.35rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
  .header p{font-size:.82rem;opacity:.9;margin-top:2px}
  .cfg-btn{position:absolute;top:calc(env(safe-area-inset-top) + 16px);right:16px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.18);border:0;color:#fff;font-size:1.2rem;cursor:pointer}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 90px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:14px}
  .card h2{font-size:1rem;font-weight:600;margin-bottom:.3rem}
  .sub{font-size:.85rem;color:var(--muted)}
  input.f{width:100%;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:11px;padding:12px 14px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px}
  input.f:focus{border-color:var(--primary2)}
  .btn{width:100%;border:0;background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff;border-radius:12px;padding:13px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.soft{background:var(--card2);color:var(--ink);border:1.5px solid var(--line)}
  .btn:disabled{opacity:.6}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 14px;cursor:pointer;text-align:left}
  .tile .ic{font-size:1.6rem}
  .tile .t{font-weight:600;margin-top:6px}
  .tile .s{font-size:.78rem;color:var(--muted);margin-top:2px}
  .status{font-size:.85rem;margin-top:8px;min-height:1.1em}
  .status.err{color:var(--erro)} .status.ok{color:var(--ok)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none}
  .modal-bg.open{display:block}
  .modal{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:22px 22px 0 0;z-index:61;padding:12px 18px calc(env(safe-area-inset-bottom) + 20px);max-height:82vh;overflow:auto}
  .modal .handle{width:42px;height:5px;border-radius:5px;background:var(--line);margin:4px auto 14px}
  .mitem{display:flex;gap:12px;align-items:center;width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px;color:var(--ink);font-size:1rem;font-weight:500;cursor:pointer;text-align:left;font-family:inherit}
  .mitem .mic{font-size:1.15rem}
  .code-box{font-size:1.8rem;font-weight:700;letter-spacing:4px;text-align:center;background:var(--card2);border:1px dashed var(--primary2);border-radius:12px;padding:16px;margin:10px 0;color:var(--primary2)}
  .conn{font-size:.85rem;color:var(--muted);margin-top:6px}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 20px);transform:translateX(-50%) translateY(20px);background:#0a0f15;color:#fff;border:1px solid var(--line);padding:11px 18px;border-radius:999px;font-size:.9rem;opacity:0;transition:.25s;z-index:70;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .back-btn{position:absolute;top:calc(env(safe-area-inset-top) + 14px);left:10px;width:40px;height:44px;border-radius:12px;background:transparent;border:0;color:#fff;font-size:1.8rem;line-height:1;cursor:pointer;display:none}
  .header.sub-view h1{padding-left:36px}
  select.f{width:100%;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:11px;padding:12px 14px;font-size:1rem;font-family:inherit;margin-bottom:10px;outline:none;-webkit-appearance:none;appearance:none}
  select.f:focus{border-color:var(--primary2)}
  label.fl{display:block;font-size:.8rem;color:var(--muted);margin:2px 0 5px}
  .seg{display:flex;gap:6px;overflow-x:auto;padding:2px 0 4px;margin:14px 0 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .seg::-webkit-scrollbar{display:none}
  .seg button{flex:0 0 auto;border:1px solid var(--line);background:var(--card2);color:var(--muted);border-radius:999px;padding:7px 14px;font-size:.82rem;font-family:inherit;cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--primary);border-color:var(--primary);color:#fff}
  .row{display:flex;align-items:center;gap:11px;padding:12px 0;border-top:1px solid var(--line)}
  .row:first-child{border-top:0}
  .row .grow{flex:1;min-width:0}
  .row .tt{font-weight:500;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .tt.done{text-decoration:line-through;opacity:.5}
  .row .ms{font-size:.77rem;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ib{border:0;background:transparent;color:var(--muted);font-size:1.15rem;cursor:pointer;padding:6px;border-radius:8px;line-height:1}
  .ib:active{background:var(--card2)}
  .chk{width:24px;height:24px;flex:0 0 auto;border:2px solid var(--line);border-radius:8px;background:var(--card2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem}
  .chk.on{background:var(--ok);border-color:var(--ok)}
  .tag{font-size:.66rem;padding:2px 8px;border-radius:999px;font-weight:600;white-space:nowrap;flex:0 0 auto}
  .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;display:inline-block}
  .rsvp{display:flex;gap:6px;flex:0 0 auto}
  .rsvp button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card2);color:var(--muted);cursor:pointer;font-size:1rem;line-height:1}
  .rsvp button.yes.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .rsvp button.no.on{background:var(--erro);border-color:var(--erro);color:#fff}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
  .stat .n{font-size:1.55rem;font-weight:600;line-height:1.1}
  .stat .l{font-size:.74rem;color:var(--muted);margin-top:4px}
  .prog{height:10px;border-radius:999px;background:var(--card2);overflow:hidden;margin-top:10px;border:1px solid var(--line)}
  .prog > i{display:block;height:100%;background:linear-gradient(90deg,#185FA5,#1a7a8a);border-radius:999px;transition:width .4s}
  .cd{display:flex;gap:10px;justify-content:center;text-align:center}
  .cd .b{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px 4px}
  .cd .b .v{font-size:1.8rem;font-weight:700;color:var(--primary2)}
  .cd .b .k{font-size:.7rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
  .addbar{display:flex;gap:8px;margin-top:12px}
  .addbar .f{margin-bottom:0}
  .addbar .btn{width:auto;flex:0 0 auto;padding:12px 16px}
  .mini{font-size:.82rem;color:var(--muted)}
  .clsec{border:1px solid var(--line);border-radius:12px;margin-top:12px;overflow:hidden;background:var(--card2)}
  .clsec-h{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;font-weight:600;font-size:.95rem}
  .clsec-h .cnt{margin-left:auto;font-size:.78rem;color:var(--muted);font-weight:400}
  .clsec-b{padding:4px 14px 12px}
  .empty{text-align:center;color:var(--muted);font-size:.9rem;padding:26px 10px}
  .totbar{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .totbar .v{font-size:1.4rem;font-weight:700}
  .badge{font-size:.66rem;padding:2px 8px;border-radius:999px;font-weight:600;color:#fff;white-space:nowrap}
  .parc{border:1px solid var(--line);border-radius:10px;padding:8px;margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;background:var(--card2)}
  .pf{border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:9px 8px;font-size:.85rem;font-family:inherit;outline:none;min-width:0}
  .pf:focus{border-color:var(--primary2)}
  .parc .pl{flex:1 1 100%}
  .parc .pv{flex:1 1 88px}
  .parc .pd{flex:1 1 132px}
  .parc .pk{flex:0 0 auto}
  .parc .ib{flex:0 0 auto;margin-left:auto}
</style>
</head>
<body>
  <div class="header">
    <button class="back-btn" id="backBtn" aria-label="Voltar">‹</button>
    <button class="cfg-btn" id="cfgBtn" aria-label="Configurações">⚙️</button>
    <h1 id="htitle">💍 Casamento</h1>
    <p id="hsub">Nosso planejamento</p>
  </div>
  <div class="wrap"><div id="app"></div></div>

  <div class="modal-bg" id="cfgBg"></div>
  <div class="modal" id="cfgModal" style="display:none">
    <div class="handle"></div>
    <div id="cfgBody"></div>
  </div>
  <div class="modal-bg" id="fBg"></div>
  <div class="modal" id="fModal" style="display:none">
    <div class="handle"></div>
    <div id="fBody"></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var SB_URL='https://jlouesrrmqeauzlgvrpw.supabase.co';
  var SB_KEY='sb_publishable_ulG1woVG1p1Seax63GGYPQ_PG6-8l-G';
  var sb=null, user=null, espacoId=null, espacoNome='Casamento', dados={};
  var $=function(s){return document.querySelector(s);};
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  var toastT=null;
  function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2000);}

  /* ---------- tema ---------- */
  function setTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('cas_theme',t);}catch(e){}renderCfg();}
  function initTheme(){var t='dark';try{t=localStorage.getItem('cas_theme')||'dark';}catch(e){}document.documentElement.setAttribute('data-theme',t);}

  /* ---------- atualizar app ---------- */
  async function updateApp(){
    try{toast('Atualizando…');}catch(e){}
    if(!('serviceWorker' in navigator)){location.reload();return;}
    try{
      var reg=await navigator.serviceWorker.getRegistration();
      if(reg){try{await reg.update();}catch(e){}}
      if(reg&&reg.waiting){var done=false;navigator.serviceWorker.addEventListener('controllerchange',function(){if(done)return;done=true;location.reload();});reg.waiting.postMessage({type:'SKIP_WAITING'});setTimeout(function(){if(!done){done=true;location.reload();}},1500);return;}
      if(window.caches){var ks=await caches.keys();await Promise.all(ks.map(function(k){return caches.delete(k);}));}
      location.reload();
    }catch(e){location.reload();}
  }

  /* ---------- supabase ---------- */
  function sbInit(){if(!sb&&window.supabase){try{sb=window.supabase.createClient(SB_URL,SB_KEY);sb.auth.onAuthStateChange(function(_e,sess){user=sess?sess.user:null;if(user){boot();}else{render();}});}catch(e){sb=null;}}return sb;}

  async function sbLogin(){
    sbInit();if(!sb){toast('Sem conexão.');return;}
    var email=($('#loEmail').value||'').trim().toLowerCase(), pass=($('#loPass').value||'');
    if(!email||email.indexOf('@')<1){setStatus('Digite um e-mail válido.','err');return;}
    if(!pass){setStatus('Digite a senha.','err');return;}
    var b=$('#loBtn');if(b){b.disabled=true;b.textContent='entrando…';}
    var r=await sb.auth.signInWithPassword({email:email,password:pass});
    if(r.error){if(b){b.disabled=false;b.textContent='Entrar';}setStatus(/Invalid login/i.test(r.error.message)?'E-mail ou senha incorretos.':('Falha: '+r.error.message),'err');return;}
    user=r.data.user; boot();
  }
  function sbLogout(){ (sb?sb.auth.signOut():Promise.resolve()).then(function(){user=null;espacoId=null;dados={};closeCfg();render();toast('Saiu da conta.');}); }
  function setStatus(m,cls){var s=$('#loStatus');if(s){s.className='status '+(cls||'');s.textContent=m;}}

  /* ---------- espaço (reaproveita o motor do "lista") ---------- */
  async function carregarEspacos(){
    var r=await sb.from('listas').select('id,nome,tipo').eq('tipo','casamento').order('created_at');
    return r.error?[]:(r.data||[]);
  }
  async function criarEspaco(){
    var r=await sb.rpc('criar_lista',{p_nome:'Casamento',p_tipo:'casamento'});
    if(r.error){toast('Falha: '+r.error.message);return;}
    espacoId=r.data; await carregarDados(); render();
  }
  async function entrarPorCodigo(){
    var code=($('#joinCode').value||'').trim().toUpperCase();
    if(code.length<4){setStatus('Digite o código.','err');return;}
    var r=await sb.rpc('entrar_por_codigo',{p_codigo:code});
    if(r.error){setStatus(/invalido/i.test(r.error.message)?'Código inválido.':(/expirado/i.test(r.error.message)?'Código expirado.':('Falha: '+r.error.message)),'err');return;}
    espacoId=r.data; await carregarDados(); toast('Entrou no casamento ✓'); render();
  }
  async function gerarConvite(){
    if(!espacoId)return;
    var r=await sb.rpc('criar_convite',{p_lista:espacoId});
    if(r.error){toast('Falha: '+r.error.message);return;}
    renderCfg(r.data);
  }

  /* ---------- dados (casamento_state key/value) ---------- */
  async function carregarDados(){
    dados={};
    if(!espacoId)return;
    var r=await sb.from('casamento_state').select('key,value').eq('lista_id',espacoId);
    if(!r.error){(r.data||[]).forEach(function(x){dados[x.key]=x.value;});}
  }
  async function salvar(key,value){
    if(!espacoId)return;
    dados[key]=value;
    await sb.from('casamento_state').upsert({lista_id:espacoId,key:key,value:value,updated_at:new Date().toISOString()});
  }
  window.CAS={get:function(k,def){return (k in dados)?dados[k]:def;},set:salvar,espaco:function(){return espacoId;},reload:async function(){await carregarDados();render();}};

  /* ---------- boot ---------- */
  async function boot(){
    if(!user){render();return;}
    var esps=await carregarEspacos();
    if(esps.length){espacoId=esps[0].id;espacoNome=esps[0].nome||'Casamento';await carregarDados();}
    else{espacoId=null;}
    render();
  }

  /* ---------- dados: helpers (leem as MESMAS chaves/shapes do HUB) ---------- */
  var NIVEIS=[['obrigatorio','Com certeza','#34d399'],['queremos','Queremos','#fbbf24'],['pensar','Pensar muito','#22d3ee'],['secouber','Se couber','#a78bfa']];
  function nivelInfo(k){for(var i=0;i<NIVEIS.length;i++)if(NIVEIS[i][0]===k)return NIVEIS[i];return NIVEIS[0];}
  function gConv(){var a=CAS.get('convidados',[]);return Array.isArray(a)?a:[];}
  function gTar(){var a=CAS.get('tarefas',[]);return Array.isArray(a)?a:[];}
  function gGas(){var a=CAS.get('gastos',[]);return Array.isArray(a)?a:[];}
  function gChk(){var c=CAS.get('checklist',{sections:[]});if(!c||typeof c!=='object')c={sections:[]};if(!Array.isArray(c.sections))c.sections=[];return c;}
  function gMeta(){return parseFloat(CAS.get('meta',0))||0;}
  function gData(){return CAS.get('data','')||'';}
  function effStatus(c){return c.status||(c.nivel==='obrigatorio'?'confirmado':'pendente');}
  function qtd(c){return parseInt(c.qtd)||1;}
  // gasto tolerante ao shape rico do HUB
  function gasVal(g){return parseFloat(g.valor)||0;}
  function gasCancel(g){return !!g.cancelado||g.statusForn==='Cancelado';}
  function gasCat(g){return g.categoria||g.empresa||'';}
  function gasPago(g){if(typeof g.pago==='boolean')return g.pago;if(Array.isArray(g.parcelas)&&g.parcelas.length)return g.parcelas.every(function(p){return p.paga;});return g.status==='pago';}
  var _idc=null;
  function nid(){if(_idc==null){var all=[].concat(gConv(),gTar(),gGas()).map(function(x){return parseInt(x&&x.id)||0;});_idc=Math.max.apply(null,[2000].concat(all));}return ++_idc;}
  function fmt(v){return 'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function pm(s){s=String(s==null?'':s).trim();if(!s)return 0;s=s.replace(/[^\d.,]/g,'');if(s.indexOf(',')>=0)s=s.replace(/\./g,'').replace(',','.');return parseFloat(s)||0;}
  function save(k,v){CAS.set(k,v);}
  function countdown(){
    var d=gData();if(!d||!/^\d{4}-\d{2}-\d{2}$/.test(d))return null;
    var alvo=new Date(d+'T00:00:00'),hoje=new Date();hoje.setHours(0,0,0,0);
    var dias=Math.round((alvo-hoje)/86400000);
    return {dias:dias,sem:Math.floor(Math.abs(dias)/7),meses:Math.round(Math.abs(dias)/30.44),alvo:alvo};
  }

  /* ---------- form (bottom-sheet) ---------- */
  function openForm(html){$('#fBody').innerHTML=html;$('#fBg').classList.add('open');$('#fModal').style.display='block';}
  function closeForm(){$('#fBg').classList.remove('open');$('#fModal').style.display='none';$('#fBody').innerHTML='';}

  /* ---------- render / router ---------- */
  var view='home';
  var SECOES=[['🏠','Início','resumo do casamento','inicio'],['👥','Convidados','lista e confirmações','convidados'],['✅','Tarefas','o que falta fazer','tarefas'],['💸','Gastos','orçamento e pagamentos','gastos'],['📋','Checklist','itens do dia','checklist']];
  var TITULOS={inicio:'Início',convidados:'Convidados',tarefas:'Tarefas',gastos:'Gastos',checklist:'Checklist'};
  function go(v){view=v;closeForm();window.scrollTo(0,0);render();}
  function render(){
    var app=$('#app'),bb=$('#backBtn'),hd=document.querySelector('.header');
    if(!user){
      view='home';bb.style.display='none';hd.classList.remove('sub-view');
      $('#htitle').innerHTML='💍 Casamento';$('#hsub').textContent='Entre na sua conta';
      app.innerHTML='<div class="card"><h2>🔐 Entrar na sua conta</h2><div class="sub" style="margin-bottom:12px">E-mail e senha. A mesma conta da suíte.</div>'+
        '<input class="f" id="loEmail" type="email" autocapitalize="off" autocorrect="off" placeholder="seu e-mail">'+
        '<input class="f" id="loPass" type="password" autocomplete="current-password" placeholder="senha">'+
        '<button class="btn" id="loBtn">Entrar</button><div class="status" id="loStatus"></div></div>';
      $('#loBtn').addEventListener('click',sbLogin);
      return;
    }
    if(!espacoId){
      view='home';bb.style.display='none';hd.classList.remove('sub-view');
      $('#htitle').innerHTML='💍 Casamento';$('#hsub').textContent='Comece por aqui';
      app.innerHTML='<div class="card"><h2>💍 Nosso casamento</h2><div class="sub">Crie o espaço do casamento (você vira o dono) ou entre com um código que te passaram.</div>'+
        '<button class="btn" id="crBtn" style="margin-top:14px">Criar o casamento</button>'+
        '<div style="height:10px"></div>'+
        '<input class="f" id="joinCode" autocapitalize="characters" placeholder="código de convite (ex.: ABC123)">'+
        '<button class="btn soft" id="joBtn">Entrar com código</button><div class="status" id="loStatus"></div></div>';
      $('#crBtn').addEventListener('click',criarEspaco);
      $('#joBtn').addEventListener('click',entrarPorCodigo);
      return;
    }
    if(view==='home'){
      bb.style.display='none';hd.classList.remove('sub-view');
      $('#htitle').innerHTML='💍 Casamento';$('#hsub').textContent=espacoNome;
      var tiles=SECOES.map(function(s){return '<div class="tile" data-act="go" data-v="'+s[3]+'"><div class="ic">'+s[0]+'</div><div class="t">'+esc(s[1])+'</div><div class="s">'+esc(s[2])+'</div></div>';}).join('');
      app.innerHTML='<div class="grid">'+tiles+'</div>';
      return;
    }
    bb.style.display='block';hd.classList.add('sub-view');
    $('#htitle').innerHTML='💍 Casamento';$('#hsub').textContent=TITULOS[view]||espacoNome;
    if(view==='inicio')renderInicio(app);
    else if(view==='convidados')renderConvidados(app);

  }

        '<div class="stat"><div class="n" style="color:'+(pagoT>=totGasto&&totGasto>0?'#34d399':'var(--ink)')+'">'+fmt(pagoT).replace('R$ ','R$ ')+'</div><div class="l">Já pago</div></div>'+
      '</div>'+
      '<div class="card"><div class="totbar"><div><div class="mini">Gasto vs meta</div><div class="v">'+fmt(totGasto)+'</div></div><div style="text-align:right"><div class="mini">Meta</div><div style="font-weight:600">'+(meta>0?fmt(meta):'—')+'</div></div></div>'+

  /* ---------- Convidados ---------- */
  var convFilter='all';

    var tot=conv.reduce(function(s,c){return s+qtd(c);},0);

      '<div class="statgrid">'+

        '<div class="stat"><div class="n" style="color:#34d399">'+conf+'</div><div class="l">Confirmados</div></div>'+
        '<div class="stat"><div class="n" style="color:#fbbf24">'+pend+'</div><div class="l">Pendentes</div></div>'+
        '<div class="stat"><div class="n" style="color:#d2533f">'+rec+'</div><div class="l">Recusaram</div></div>'+
      '</div>'+

  function saveConvidado(id){

  /* ---------- Gastos (paridade com o HUB: Fechado/Planejando, status, orçado×final, parcelas) ---------- */
  var CAS_STATUS=['Não iniciado','Pesquisando','Contatado','Aguardando retorno','Orçamento recebido','Em negociação','Escolhido','Contratado','Em andamento','Finalizado','Cancelado'];
  function casStatusTipo(s){return ['Contratado','Em andamento','Finalizado'].indexOf(s)>=0?'fechado':'planejado';}
  function gTipoOf(g){return g.tipo==='planejado'?'planejado':'fechado';}
  function casStatusOf(g){return g.statusForn||(gTipoOf(g)==='fechado'?'Contratado':'Não iniciado');}
  function casStatusColor(s){if(s==='Cancelado')return '#d2533f';if(['Contratado','Em andamento','Finalizado'].indexOf(s)>=0)return '#1f9d63';if(['Orçamento recebido','Em negociação','Escolhido'].indexOf(s)>=0)return '#c99a2e';return '#5b6b7d';}
  function gParc(g){return Array.isArray(g.parcelas)?g.parcelas:[];}
  function gPagoAmt(g){var p=gParc(g);if(p.length)return p.filter(function(x){return x.paga;}).reduce(function(s,x){return s+(parseFloat(x.valor)||0);},0);return (g.pago===true||g.status==='pago')?gasVal(g):0;}
  function gStatusOf(g){var p=gParc(g);if(!p.length)return g.status||'apagar';var pago=gPagoAmt(g);if(pago<=0.001)return 'apagar';if(pago>=gasVal(g)-0.001)return 'pago';return 'parcial';}
  function gEco(g){var vi=parseFloat(g.valorIni)||0;return vi>gasVal(g)?vi-gasVal(g):0;}
  function gProxVenc(g){var ds=gParc(g).filter(function(x){return !x.paga&&x.venc;}).map(function(x){return x.venc;}).sort();if(!ds.length)return g.venc||'';return fmtBR(ds[0])+(ds.length>1?' +'+(ds.length-1):'');}
  function moneyIn(v){return (Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
  function addMonthsISO(iso,n){var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);if(!m)return iso;var t=new Date(+m[1],(+m[2]-1)+n,1);var last=new Date(t.getFullYear(),t.getMonth()+1,0).getDate();var day=Math.min(+m[3],last);return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');}
  function curG(id){return gGas().filter(function(x){return String(x.id)===String(id);})[0];}
  function gastosResumo(){
    var ativos=gGas().filter(function(g){return !gasCancel(g);});
    var fechados=ativos.filter(function(g){return gTipoOf(g)==='fechado';});
    var plan=ativos.filter(function(g){return gTipoOf(g)==='planejado';});
    var totalFechado=fechados.reduce(function(s,g){return s+gasVal(g);},0);
    var totalPlan=plan.reduce(function(s,g){return s+(parseFloat(g.valorIni)||gasVal(g));},0);
    var pago=fechados.reduce(function(s,g){return s+gPagoAmt(g);},0);
    var economia=ativos.reduce(function(s,g){var vi=parseFloat(g.valorIni)||0;return s+(vi>0?(vi-gasVal(g)):0);},0);
    return {totalFechado:totalFechado,totalPlan:totalPlan,pago:pago,apagar:totalFechado-pago,projecao:totalFechado+totalPlan,economia:economia,meta:gMeta()};
  }
  var gasFiltro='fechado';
  function renderGastos(app){
    var r=gastosResumo(),meta=r.meta;
    var pct=meta>0?Math.min(r.projecao/meta,1)*100:0;
    var metaLine=meta>0?(r.projecao<=meta?'<span style="color:var(--ok)">sobra '+fmt(meta-r.projecao)+'</span>':'<span style="color:var(--erro)">estoura '+fmt(r.projecao-meta)+'</span>'):'toque em "Definir meta"';
    var lista=gGas().filter(function(g){return gasFiltro==='todos'?true:gTipoOf(g)===gasFiltro;});
    var seg='<div class="seg">'+[['fechado','Fechados'],['planejado','Planejando'],['todos','Todos']].map(function(s){return '<button data-act="gfil" data-v="'+s[0]+'"'+(gasFiltro===s[0]?' class="on"':'')+'>'+s[1]+'</button>';}).join('')+'</div>';
    var rows=lista.map(function(g){
      var canc=gasCancel(g),st=casStatusOf(g),cor=casStatusColor(st),tipo=gTipoOf(g),eco=gEco(g);
      var right='<div style="font-weight:600">'+fmt(gasVal(g))+'</div>'+(eco>0?'<div class="ms" style="color:#34d399">▼ '+fmt(eco)+'</div>':'');
      var sub=['<span class="badge" style="background:'+cor+'">'+esc(st)+'</span>'];
      if(g.empresa||g.categoria)sub.push('<span>'+esc(g.empresa||g.categoria)+'</span>');
      if(tipo==='fechado'){var p=gParc(g);if(p.length)sub.push('<span>'+p.filter(function(x){return x.paga;}).length+'/'+p.length+' pago</span>');var pv=gProxVenc(g);if(pv&&!canc)sub.push('<span>venc '+esc(pv)+'</span>');}
      return '<div class="row"><div class="grow" data-act="gedit" data-id="'+g.id+'"><div class="tt'+(canc?' done':'')+'">'+esc(g.desc||'(sem descrição)')+'</div>'+
        '<div class="ms" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;white-space:normal">'+sub.join('<span style="opacity:.35">·</span>')+'</div></div>'+
        '<div style="text-align:right;flex:0 0 auto">'+right+'</div>'+
        (tipo==='fechado'?'<button class="ib" data-act="gpag" data-id="'+g.id+'" title="Pagamentos">💳</button>':'')+
        '<button class="ib" data-act="gdel" data-id="'+g.id+'">🗑</button></div>';
    }).join('');
    var emptyTxt=gasFiltro==='planejado'?'Nada em planejamento ainda.':gasFiltro==='fechado'?'Nenhum gasto fechado ainda.':'Nenhum gasto lançado.';
    app.innerHTML=
      '<div class="card"><div class="totbar"><div><div class="mini">Projeção</div><div class="v">'+fmt(r.projecao)+'</div></div><div style="text-align:right"><div class="mini">Meta</div><div style="font-weight:600">'+(meta>0?fmt(meta):'—')+'</div></div></div>'+
        '<div class="prog"><i style="width:'+pct+'%"></i></div>'+
        '<div class="mini" style="margin-top:8px">'+metaLine+(r.economia>0?' · <span style="color:#34d399">economizou '+fmt(r.economia)+'</span>':'')+'</div>'+
        '<button class="btn soft" data-act="gmeta" style="margin-top:12px">Definir meta</button></div>'+
      '<div class="statgrid">'+
        '<div class="stat"><div class="n" style="font-size:1.1rem;color:#4a90d9">'+fmt(r.totalFechado)+'</div><div class="l">Fechado</div></div>'+
        '<div class="stat"><div class="n" style="font-size:1.1rem;color:#34d399">'+fmt(r.pago)+'</div><div class="l">Pago</div></div>'+
        '<div class="stat"><div class="n" style="font-size:1.1rem;color:'+(r.apagar>0.01?'#d2533f':'#34d399')+'">'+fmt(r.apagar)+'</div><div class="l">A pagar</div></div>'+
        '<div class="stat"><div class="n" style="font-size:1.1rem;color:#a78bfa">'+fmt(r.totalPlan)+'</div><div class="l">Planejado</div></div>'+
      '</div>'+
      '<button class="btn" data-act="gadd" style="margin-top:14px">＋ Novo gasto</button>'+
      seg+
      (lista.length?'<div class="card">'+rows+'</div>':'<div class="card"><div class="empty">'+emptyTxt+'</div></div>');
  }
  function formGasto(g){
    g=g||{};
    var cur=g.id?casStatusOf(g):'Não iniciado';
    var stOpts=CAS_STATUS.map(function(s){return '<option'+(s===cur?' selected':'')+'>'+esc(s)+'</option>';}).join('');
    openForm('<h2 style="font-size:1.05rem;font-weight:600;margin-bottom:10px">'+(g.id?'Editar gasto':'Novo gasto')+'</h2>'+
      '<label class="fl">Descrição</label><input class="f" id="gDesc" value="'+esc(g.desc||'')+'" placeholder="Ex.: Buffet">'+
      '<label class="fl">Status</label><select class="f" id="gStatus">'+stOpts+'</select>'+
      '<div class="mini" style="margin:-4px 0 10px">Contratado / Em andamento / Finalizado vão pra <b>Fechados</b>. Os demais ficam em <b>Planejando</b>.</div>'+
      '<label class="fl">Fornecedor / empresa</label><input class="f" id="gEmp" value="'+esc(g.empresa||g.categoria||'')+'" placeholder="Ex.: Espaço Jardim">'+
      '<label class="fl">Valor orçado (opcional — pra ver economia)</label><input class="f" id="gVi" inputmode="decimal" value="'+(g.valorIni?moneyIn(g.valorIni):'')+'" placeholder="0,00">'+
      '<label class="fl">Valor final (R$)</label><input class="f" id="gVal" inputmode="decimal" value="'+(g.valor?moneyIn(g.valor):'')+'" placeholder="0,00">'+
      '<label class="fl">Observação</label><input class="f" id="gObs" value="'+esc(g.obs||'')+'" placeholder="opcional">'+
      (g.id&&gTipoOf(g)==='fechado'?'<button class="btn soft" data-act="gpag" data-id="'+g.id+'" style="margin-top:2px">💳 Pagamentos / parcelas</button>':'')+
      '<button class="btn" data-act="gsave" data-id="'+(g.id||'')+'" style="margin-top:8px">Salvar</button>'+
      (g.id?'<button class="btn soft" data-act="gdel" data-id="'+g.id+'" style="margin-top:8px">Excluir</button>':''));
  }
  function saveGasto(id){
    var desc=($('#gDesc').value||'').trim();if(!desc){$('#gDesc').focus();return;}
    var statusForn=$('#gStatus').value,emp=($('#gEmp').value||'').trim(),obs=($('#gObs').value||'').trim();
    var valor=pm($('#gVal').value),valorIni=pm($('#gVi').value),tipo=casStatusTipo(statusForn),cancel=(statusForn==='Cancelado');
    var arr=gGas().slice();
    if(id){
      var g=arr.filter(function(x){return String(x.id)===String(id);})[0];
      if(g){
        g.desc=desc;g.statusForn=statusForn;g.empresa=emp;g.categoria=emp;g.obs=obs;g.valor=valor;g.valorIni=valorIni;g.tipo=tipo;g.cancelado=cancel;
        if(tipo==='fechado'&&!gParc(g).length)g.parcelas=[{label:'Parcela 1',valor:valor,paga:false}];
        if(tipo==='planejado'&&gParc(g).length&&!gParc(g).some(function(p){return p.paga;}))g.parcelas=[];
        if('pago' in g)delete g.pago;
        g.status=gStatusOf(g);
      }
    }else{
      var ng={id:nid(),data:new Date().toLocaleDateString('pt-BR'),desc:desc,statusForn:statusForn,empresa:emp,categoria:emp,obs:obs,valor:valor,valorIni:valorIni,tipo:tipo,cancelado:cancel,parcelas:[],status:'apagar'};
      if(tipo==='fechado')ng.parcelas=[{label:'Parcela 1',valor:valor,paga:false}];
      arr.push(ng);
    }
    save('gastos',arr);closeForm();render();
  }
  /* ---- editor de pagamentos / parcelas ---- */
  var pagEditId=null;
  function parcRow(p,i){
    return '<div class="parc">'+
      '<input class="pf pl" placeholder="Parcela '+(i+1)+'" value="'+esc(p.label||'')+'">'+
      '<input class="pf pv" inputmode="decimal" value="'+moneyIn(p.valor||0)+'">'+
      '<input class="pf pd" type="date" value="'+esc(p.venc||'')+'">'+
      '<span class="chk pk'+(p.paga?' on':'')+'" data-act="gptog" title="Paga?">'+(p.paga?'✓':'')+'</span>'+
      '<button class="ib" data-act="gprem" title="Remover">✕</button></div>';
  }
  function formPagamento(id){
    var g=curG(id);if(!g)return;pagEditId=g.id;
    var p=gParc(g);if(!p.length)p=[{label:'',valor:gasVal(g),paga:(g.status==='pago'||g.pago===true)}];
    openForm('<h2 style="font-size:1.05rem;font-weight:600;margin-bottom:4px">💳 Pagamentos</h2>'+
      '<div class="mini" style="margin-bottom:8px">'+esc(g.desc)+' · total '+fmt(gasVal(g))+'</div>'+
      '<div id="parcWrap">'+p.map(function(x,i){return parcRow(x,i);}).join('')+'</div>'+
      '<div class="addbar" style="margin-top:8px"><button class="btn soft" data-act="gpadd" style="flex:1">＋ parcela</button><button class="btn soft" data-act="gpdiv" style="flex:1">÷ dividir igual</button></div>'+
      '<div class="card" style="margin-top:10px;padding:12px">'+
        '<div class="fl" style="margin-top:0">Gerar automático</div>'+
        '<div class="addbar"><input class="f" id="gpEnt" inputmode="decimal" placeholder="entrada R$" style="flex:1"><input class="f" id="gpN" inputmode="numeric" placeholder="nº parcelas" style="flex:0 0 108px"></div>'+
        '<button class="btn soft" data-act="gpgen">Gerar entrada + parcelas</button>'+
        '<button class="btn soft" data-act="gpdatas" style="margin-top:6px">📅 Datas mês a mês (a partir da 1ª)</button>'+
      '</div>'+
      '<div id="gpResumo" class="mini" style="margin-top:10px"></div>'+
      '<button class="btn" data-act="gpsave" data-id="'+g.id+'" style="margin-top:8px">Salvar pagamentos</button>');
    gpCalc();
  }
  function gpRows(){return [].slice.call(document.querySelectorAll('#parcWrap .parc'));}
  function gpCalc(){
    var g=curG(pagEditId);if(!g)return;var t=gasVal(g),soma=0,pago=0;
    gpRows().forEach(function(r){var v=pm(r.querySelector('.pv').value);soma+=v;if(r.querySelector('.pk').classList.contains('on'))pago+=v;});
    var diff=Math.round((soma-t)*100)/100;
    var conf=Math.abs(diff)<=0.01?'<span style="color:#34d399">✓ confere com o total</span>':'<span style="color:#fbbf24">⚠ difere '+fmt(Math.abs(diff))+(diff>0?' a mais':' a menos')+'</span>';
    var el=$('#gpResumo');if(el)el.innerHTML='<b>Soma:</b> '+fmt(soma)+' · '+conf+'<br><b>Pago:</b> '+fmt(pago)+' · restante '+fmt(Math.max(0,soma-pago));
  }
  function gpDividir(){var g=curG(pagEditId);if(!g)return;var t=gasVal(g),rows=gpRows(),n=rows.length;if(!n)return;var base=Math.round(t/n*100)/100,acc=0;rows.forEach(function(r,i){var v=(i===n-1)?Math.round((t-acc)*100)/100:base;acc+=base;r.querySelector('.pv').value=moneyIn(v);});gpCalc();}
  function gpGerar(){var g=curG(pagEditId);if(!g)return;var t=gasVal(g),ent=pm($('#gpEnt').value),n=Math.max(0,parseInt($('#gpN').value)||0),rows=[];if(ent>0.001)rows.push({label:'Entrada',valor:ent,paga:false});var rest=Math.max(0,t-ent);if(n>0){var base=Math.round(rest/n*100)/100,acc=0;for(var i=0;i<n;i++){var v=(i===n-1)?Math.round((rest-acc)*100)/100:base;acc+=base;rows.push({label:'Parcela '+(i+1),valor:v,paga:false});}}else if(ent<=0.001){rows.push({label:'Parcela 1',valor:t,paga:false});}$('#parcWrap').innerHTML=rows.map(function(p,i){return parcRow(p,i);}).join('');gpCalc();}
  function gpDatas(){var rows=gpRows();if(rows.length<2){toast('Adicione mais parcelas primeiro');return;}var first=rows[0].querySelector('.pd').value;if(!first){toast('Preencha a data da 1ª parcela');rows[0].querySelector('.pd').focus();return;}rows.forEach(function(r,i){if(i>0)r.querySelector('.pd').value=addMonthsISO(first,i);});toast('Datas a cada mês ✓');}
  function gpSalvar(id){var arr=gGas().slice();var g=arr.filter(function(x){return String(x.id)===String(id);})[0];if(!g)return;g.parcelas=gpRows().map(function(r){return {label:(r.querySelector('.pl').value||'').trim(),valor:pm(r.querySelector('.pv').value),venc:r.querySelector('.pd').value,paga:r.querySelector('.pk').classList.contains('on')};});if('pago' in g)delete g.pago;g.status=gStatusOf(g);save('gastos',arr);closeForm();render();}

  /* ---------- Checklist ---------- */
  function renderChecklist(app){
    var cl=gChk();var total=0,done=0;
    cl.sections.forEach(function(s){var it=s.items||[];total+=it.length;done+=it.filter(function(i){return i.done;}).length;});
    var pct=total?Math.round(done/total*100):0;
    var secs=cl.sections.map(function(s){
      var it=s.items||[],dn=it.filter(function(i){return i.done;}).length,open=s.open!==false;
      var items=it.map(function(i){
        return '<div class="row"><span class="chk'+(i.done?' on':'')+'" data-act="clt" data-sid="'+esc(s.id)+'" data-iid="'+esc(i.id)+'">'+(i.done?'✓':'')+'</span>'+
          '<div class="grow" data-act="cli" data-sid="'+esc(s.id)+'" data-iid="'+esc(i.id)+'"><div class="tt'+(i.done?' done':'')+'" style="white-space:normal">'+esc(i.text)+'</div></div>'+
          '<button class="ib" data-act="cldi" data-sid="'+esc(s.id)+'" data-iid="'+esc(i.id)+'">🗑</button></div>';
      }).join('');
      return '<div class="clsec"><div class="clsec-h" data-act="clto" data-sid="'+esc(s.id)+'"><span>'+(open?'▾':'▸')+'</span>'+esc(s.name)+'<span class="cnt">'+dn+'/'+it.length+'</span>'+
        '<button class="ib" data-act="clds" data-sid="'+esc(s.id)+'">🗑</button></div>'+
        (open?'<div class="clsec-b">'+items+'<div class="addbar"><input class="f" id="cli-'+esc(s.id)+'" placeholder="Adicionar item…"><button class="btn" data-act="clai" data-sid="'+esc(s.id)+'">＋</button></div></div>':'')+'</div>';
    }).join('');
    app.innerHTML=
      '<div class="card"><div class="mini">Progresso</div><div class="prog"><i style="width:'+pct+'%"></i></div><div class="mini" style="margin-top:8px">'+done+' de '+total+' itens ('+pct+'%)</div></div>'+
      '<button class="btn" data-act="clas" style="margin-top:14px">＋ Nova seção</button>'+
      (cl.sections.length?secs:'<div class="card"><div class="empty">Nenhuma seção ainda.<br>Crie uma pra listar os itens.</div></div>');
  }

  function fmtBR(d){var m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(d||'');return m?m[3]+'/'+m[2]+'/'+m[1]:(d||'');}

  /* ---------- delegação de eventos ---------- */
  function findId(el){return el.getAttribute('data-id');}
  function onAppClick(e){
    var el=e.target.closest('[data-act]');if(!el)return;
    var act=el.getAttribute('data-act'),id=el.getAttribute('data-id'),v=el.getAttribute('data-v');
    var sid=el.getAttribute('data-sid'),iid=el.getAttribute('data-iid');
    if(act==='go'){go(v);return;}
    if(act==='setdata'){pedirData();return;}
    // convidados
    if(act==='cadd'){formConvidado(null);return;}
    if(act==='cedit'){var c=gConv().filter(function(x){return String(x.id)===String(id);})[0];if(c)formConvidado(c);return;}
    if(act==='cfil'){convFilter=v;render();return;}
    if(act==='cst'){var arr=gConv().slice();var c=arr.filter(function(x){return String(x.id)===String(id);})[0];if(c){c.status=(effStatus(c)===v?'pendente':v);save('convidados',arr);render();}return;}
    if(act==='cdel'){var nm=(gConv().filter(function(x){return String(x.id)===String(id);})[0]||{}).nome||'convidado';if(confirm('Excluir "'+nm+'"?')){save('convidados',gConv().filter(function(x){return String(x.id)!==String(id);}));closeForm();render();}return;}
    if(act==='csave'){saveConvidado(id);return;}
    // tarefas
    if(act==='tadd'){formTarefa(null);return;}
    if(act==='tedit'){var t=gTar().filter(function(x){return String(x.id)===String(id);})[0];if(t)formTarefa(t);return;}
    if(act==='ttog'){var ar=gTar().slice();var tt=ar.filter(function(x){return String(x.id)===String(id);})[0];if(tt){tt.done=!tt.done;save('tarefas',ar);render();}return;}
    if(act==='tdel'){if(confirm('Excluir tarefa?')){save('tarefas',gTar().filter(function(x){return String(x.id)!==String(id);}));closeForm();render();}return;}
    if(act==='tsave'){saveTarefa(id);return;}
    // gastos
    if(act==='gadd'){formGasto(null);return;}
    if(act==='gedit'){var g=curG(id);if(g)formGasto(g);return;}
    if(act==='gfil'){gasFiltro=v;render();return;}
    if(act==='gdel'){if(confirm('Excluir gasto?')){save('gastos',gGas().filter(function(x){return String(x.id)!==String(id);}));closeForm();render();}return;}
    if(act==='gsave'){saveGasto(id);return;}
    if(act==='gmeta'){var m=prompt('Meta de gastos (R$):',gMeta()||'');if(m===null)return;save('meta',pm(m));render();return;}
    // gastos — pagamentos / parcelas
    if(act==='gpag'){formPagamento(id);return;}
    if(act==='gptog'){var on=el.classList.toggle('on');el.textContent=on?'✓':'';gpCalc();return;}
    if(act==='gprem'){var pr=el.closest('.parc');if(pr&&pr.parentNode){pr.parentNode.removeChild(pr);gpCalc();}return;}
    if(act==='gpadd'){var w=$('#parcWrap');if(w){w.insertAdjacentHTML('beforeend',parcRow({label:'',valor:0,paga:false},w.querySelectorAll('.parc').length));gpCalc();}return;}
    if(act==='gpdiv'){gpDividir();return;}
    if(act==='gpgen'){gpGerar();return;}
    if(act==='gpdatas'){gpDatas();return;}
    if(act==='gpsave'){gpSalvar(id);return;}
    // checklist
    if(act==='clas'){var nome=prompt('Nome da seção:');if(!nome)return;var cl=gChk();cl.sections.push({id:'cs'+nid(),name:nome.trim(),open:true,items:[]});save('checklist',cl);render();return;}
    if(act==='clto'){var cl2=gChk();var s=cl2.sections.filter(function(x){return x.id===sid;})[0];if(s){s.open=(s.open===false);save('checklist',cl2);render();}return;}
    if(act==='clds'){if(confirm('Excluir seção?')){var cl3=gChk();cl3.sections=cl3.sections.filter(function(x){return x.id!==sid;});save('checklist',cl3);render();}return;}
    if(act==='clt'){var cl4=gChk();var s4=cl4.sections.filter(function(x){return x.id===sid;})[0];var i4=s4&&(s4.items||[]).filter(function(x){return x.id===iid;})[0];if(i4){i4.done=!i4.done;save('checklist',cl4);render();}return;}
    if(act==='cldi'){var cl5=gChk();var s5=cl5.sections.filter(function(x){return x.id===sid;})[0];if(s5){s5.items=(s5.items||[]).filter(function(x){return x.id!==iid;});save('checklist',cl5);render();}return;}
    if(act==='cli'){var cl6=gChk();var s6=cl6.sections.filter(function(x){return x.id===sid;})[0];var i6=s6&&(s6.items||[]).filter(function(x){return x.id===iid;})[0];if(i6){var nv=prompt('Editar item:',i6.text);if(nv!==null){nv=nv.trim();if(nv){i6.text=nv;save('checklist',cl6);render();}}}return;}
    if(act==='clai'){var inp=$('#cli-'+CSS.escape(sid));var txt=inp?(inp.value||'').trim():'';if(!txt)return;var cl7=gChk();var s7=cl7.sections.filter(function(x){return x.id===sid;})[0];if(s7){(s7.items=s7.items||[]).push({id:'ci'+nid(),text:txt,done:false});save('checklist',cl7);render();}return;}
    // form chk toggles
    if(el.classList.contains('chk')&&(el.id==='cvPad'||el.id==='tDone'||el.id==='gPago')){var on=el.getAttribute('data-on')==='1';el.setAttribute('data-on',on?'0':'1');el.classList.toggle('on',!on);el.textContent=on?'':'✓';return;}
  }
  function pedirData(){var v=prompt('Data do casamento (AAAA-MM-DD):',gData()||'');if(v===null)return;v=String(v).trim();if(v&&!/^\d{4}-\d{2}-\d{2}$/.test(v)){toast('Use AAAA-MM-DD, ex: 2027-05-15');return;}save('data',v);render();}

  /* ---------- Configurações ---------- */
  function openCfg(){renderCfg();$('#cfgBg').classList.add('open');$('#cfgModal').style.display='block';}
  function closeCfg(){$('#cfgBg').classList.remove('open');$('#cfgModal').style.display='none';}
  function renderCfg(code){
    var body=$('#cfgBody');if(!body)return;
    var theme=document.documentElement.getAttribute('data-theme');
    var conta = user
      ? '<div class="conn">✓ Conectado — '+esc(user.email)+'</div><button class="mitem" id="cfgOut"><span class="mic">🚪</span> Sair da conta</button>'
      : '<div class="conn">Não conectado.</div>';
    var compart = (user&&espacoId)
      ? '<button class="mitem" id="cfgShare"><span class="mic">🔗</span> Compartilhar (gerar código)</button>'+(code?'<div class="code-box">'+esc(code)+'</div><div class="sub" style="text-align:center">Passe esse código pra Débora entrar. Vale 7 dias.</div>':'')
      : '';
    var dataItem = (user&&espacoId)
      ? '<button class="mitem" id="cfgData"><span class="mic">📅</span> Data do casamento'+(gData()?' — '+esc(fmtBR(gData())):'')+'</button>'
      : '';
    body.innerHTML='<h2 style="font-size:1.05rem;font-weight:600;margin-bottom:6px">⚙️ Configurações</h2>'+
      conta+compart+dataItem+
      '<button class="mitem" id="cfgUpd"><span class="mic">🔄</span> Atualizar o app</button>'+
      '<button class="mitem" id="cfgTheme"><span class="mic">'+(theme==='dark'?'☀️':'🌙')+'</span> Tema '+(theme==='dark'?'claro':'escuro')+'</button>';
    var o=$('#cfgOut');if(o)o.addEventListener('click',sbLogout);
    var sh=$('#cfgShare');if(sh)sh.addEventListener('click',gerarConvite);
    var dt=$('#cfgData');if(dt)dt.addEventListener('click',function(){closeCfg();pedirData();});
    $('#cfgUpd').addEventListener('click',updateApp);
    $('#cfgTheme').addEventListener('click',function(){setTheme(theme==='dark'?'light':'dark');});
  }

  /* ---------- init ---------- */
  initTheme();
  $('#cfgBtn').addEventListener('click',openCfg);
  $('#cfgBg').addEventListener('click',closeCfg);
  $('#backBtn').addEventListener('click',function(){go('home');});
  $('#fBg').addEventListener('click',closeForm);
  document.addEventListener('click',onAppClick);
  document.addEventListener('input',function(e){if(e.target&&e.target.closest&&e.target.closest('#parcWrap'))gpCalc();});
  sbInit();
  if(sb){sb.auth.getSession().then(function(s){user=(s&&s.data&&s.data.session)?s.data.session.user:null;boot();});}else{render();}

  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
})();
</script>
</body>
